spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: Itemapp
  datasource:
    url: ${LOCAL_DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jwt:
    secret: ${JWT_SECRET}
    life_time: ${JWT_LIFE_TIME}
  
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  thymeleaf:
    cache: false

server:
  port: 8080
