spring:
  application:
    name: Itemapp
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jwt:
    secret: ${JWT_SECRET_COMPOSE}
    life_time: ${JWT_LIFE_TIME_COMPOSE}
  
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  thymeleaf:
    cache: false

server:
  port: 8080
